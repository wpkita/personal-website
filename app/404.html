<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found — William Kita</title>

  <style>
    *, *:before, *:after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100%;
      width: 100%;
      background-color: #4a4e4d;
      color: #ffffff;
      font-family: "Source Sans Pro", "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .wk-tiles {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .wk-name {
      line-height: 2em;
      font-size: 1.5em;
      font-weight: 300;
    }

    .wk-title {
      line-height: 2em;
      font-size: 1.25em;
      margin-bottom: 0.5em;
      font-weight: 300;
    }

    .wk-home {
      display: inline-block;
      padding: 0.5em 1em;
      background-color: #333;
      color: #ffffff;
      text-decoration: none;
    }

    .wk-home:hover {
      background-color: #222;
    }
  </style>
</head>

<body>
  <article class="wk-tiles">
    <h1 class="wk-name">404 — Page Not Found</h1>
    <h2 class="wk-title">That page doesn't exist here.</h2>
    <a class="wk-home" href="/">Back to williamkita.com</a>
  </article>
</body>

</html>
